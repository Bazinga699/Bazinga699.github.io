<script>
  $(document).ready(function () {
    var widget = document.getElementById('goatcounter-visitor-map');
    if (!widget) {
      return;
    }

    var cdnStatsUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@goatcounter-stats/country-stats.json';
    var rawStatsUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/goatcounter-stats/country-stats.json';
    var mapTitle = document.getElementById('goatcounter-map-title');
    var mapSubtitle = document.getElementById('goatcounter-map-subtitle');
    var totalVisitors = document.getElementById('goatcounter-total-visitors');
    var totalCountries = document.getElementById('goatcounter-total-countries');
    var countriesList = document.getElementById('goatcounter-country-list');
    var emptyState = document.getElementById('goatcounter-empty-state');
    var mapContainer = document.getElementById('goatcounter-map');
    var smallRegions = document.getElementById('goatcounter-small-regions');
    var tinyRegionCodes = ['AD', 'HK', 'LI', 'MC', 'MO', 'MT', 'SG', 'SM', 'VA'];

    function setEmptyState(message) {
      if (mapSubtitle) {
        mapSubtitle.textContent = message;
      }
      if (emptyState) {
        emptyState.hidden = false;
      }
      if (mapContainer) {
        mapContainer.style.display = 'none';
      }
      if (smallRegions) {
        smallRegions.hidden = true;
        smallRegions.innerHTML = '';
      }
    }

    function formatDate(value) {
      if (!value) {
        return '';
      }

      var date = new Date(value);
      if (isNaN(date.getTime())) {
        return '';
      }

      return date.toLocaleDateString(undefined, {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      }) + ' ' + date.toLocaleTimeString(undefined, {
        timeZone: 'Asia/Shanghai',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    function countryName(code) {
      if (!code) {
        return 'Unknown';
      }

      try {
        if (window.Intl && Intl.DisplayNames) {
          var displayNames = new Intl.DisplayNames(['en'], { type: 'region' });
          return displayNames.of(code) || code;
        }
      } catch (error) {}

      return code;
    }

    function ensureGoogleCharts(callback) {
      if (window.google && google.charts && google.visualization) {
        callback();
        return;
      }

      var existing = document.getElementById('google-charts-loader');
      if (existing) {
        existing.addEventListener('load', callback, { once: true });
        return;
      }

      var script = document.createElement('script');
      script.id = 'google-charts-loader';
      script.src = 'https://www.gstatic.com/charts/loader.js';
      script.async = true;
      script.onload = callback;
      document.head.appendChild(script);
    }

    function renderSmallRegions(countries) {
      if (!smallRegions) {
        return;
      }

      var tinyRegions = countries.filter(function (item) {
        return tinyRegionCodes.indexOf(item.code) !== -1;
      });

      if (!tinyRegions.length) {
        smallRegions.hidden = true;
        smallRegions.innerHTML = '';
        return;
      }

      smallRegions.innerHTML = '';

      tinyRegions.forEach(function (item) {
        var badge = document.createElement('div');
        var name = document.createElement('span');
        var count = document.createElement('strong');

        badge.className = 'visitor-map-section__small-region-badge';
        name.textContent = countryName(item.code);
        count.textContent = item.visitors.toLocaleString();

        badge.appendChild(name);
        badge.appendChild(count);
        smallRegions.appendChild(badge);
      });

      smallRegions.hidden = false;
    }

    function renderMap(data) {
      ensureGoogleCharts(function () {
        google.charts.load('current', {
          packages: ['geochart']
        });

        google.charts.setOnLoadCallback(function () {
          var chartData = new google.visualization.DataTable();
          chartData.addColumn('string', 'Country');
          chartData.addColumn('number', 'Visitors');

          (data.countries || []).forEach(function (item) {
            if (item.code && item.visitors > 0) {
              chartData.addRow([item.code, item.visitors]);
            }
          });

          var chart = new google.visualization.GeoChart(mapContainer);
          chart.draw(chartData, {
            backgroundColor: 'transparent',
            datalessRegionColor: '#f3f4f6',
            defaultColor: '#c7d2fe',
            colorAxis: {
              colors: ['#bfdbfe', '#60a5fa', '#1d4ed8']
            },
            legend: 'none',
            tooltip: {
              textStyle: {
                color: '#111827'
              }
            }
          });
        });
      });
    }

    function applyData(data) {
      var countries = data.countries || [];

      if (mapTitle) {
        mapTitle.textContent = data.title || 'Visitor Map';
      }

      if (mapSubtitle) {
        var updatedAt = formatDate(data.updated_at);
        mapSubtitle.textContent = updatedAt ? 'Updated ' + updatedAt + ' (Beijing Time)' : 'Country-level visitor distribution';
      }

      if (totalVisitors) {
        totalVisitors.textContent = (data.total_unique_visitors || 0).toLocaleString();
      }

      if (totalCountries) {
        totalCountries.textContent = (data.total_countries || 0).toLocaleString();
      }

      if (countriesList) {
        countriesList.innerHTML = '';

        countries.slice(0, 8).forEach(function (item) {
          var listItem = document.createElement('li');
          var label = document.createElement('span');
          var value = document.createElement('strong');

          label.textContent = countryName(item.code);
          value.textContent = item.visitors.toLocaleString();

          listItem.appendChild(label);
          listItem.appendChild(value);
          countriesList.appendChild(listItem);
        });
      }

      renderSmallRegions(countries);

      if (!countries.length) {
        setEmptyState('GoatCounter is connected, but there is no country data yet.');
        return;
      }

      if (emptyState) {
        emptyState.hidden = true;
      }

      if (mapContainer) {
        mapContainer.style.display = 'block';
      }

      renderMap(data);
    }

    function loadStats(url, onSuccess, onError) {
      $.getJSON(url, onSuccess).fail(onError);
    }

    loadStats(cdnStatsUrl, function (data) {
      var countries = data.countries || [];
      var totalVisitorsCount = data.total_unique_visitors || 0;

      if (!countries.length && totalVisitorsCount === 0) {
        loadStats(rawStatsUrl + '?t=' + Date.now(), function (freshData) {
          applyData(freshData);
        }, function () {
          applyData(data);
        });
        return;
      }

      applyData(data);
    }, function () {
      loadStats(rawStatsUrl + '?t=' + Date.now(), function (data) {
        applyData(data);
      }, function () {
      setEmptyState('Waiting for GoatCounter stats. Add the GoatCounter secrets and let the workflow generate the JSON file.');
      });
    });
  });
</script>
