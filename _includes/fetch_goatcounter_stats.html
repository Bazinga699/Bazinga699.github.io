<script>
  $(document).ready(function () {
    var widget = document.getElementById('goatcounter-visitor-map');
    if (!widget) {
      return;
    }

    var cdnStatsUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@goatcounter-stats/country-stats.json';
    var rawStatsUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/goatcounter-stats/country-stats.json';
    var mapTitle = document.getElementById('goatcounter-map-title');
    var mapSubtitle = document.getElementById('goatcounter-map-subtitle');
    var totalVisitors = document.getElementById('goatcounter-total-visitors');
    var totalCountries = document.getElementById('goatcounter-total-countries');
    var countriesList = document.getElementById('goatcounter-country-list');
    var emptyState = document.getElementById('goatcounter-empty-state');
    var mapContainer = document.getElementById('goatcounter-map');
    var mapTooltip = document.getElementById('goatcounter-map-tooltip');
    var mapWrap = widget.querySelector('.visitor-map-section__map-wrap');
    var localSvgMapUrl = '{{ "/assets/vendor/world-map.min.svg" | relative_url }}';
    var localSvgCacheKey = 'visitor-map-svg-v2';
    var hoverModeCache = {};
    var staticMapTitle = 'Pageviews Around the World';

    function hideEmptyState() {
      if (emptyState) {
        emptyState.style.display = 'none';
      }
    }

    function showEmptyState(message) {
      if (emptyState) {
        emptyState.textContent = message;
        emptyState.style.display = 'grid';
      }
    }

    function setEmptyState(message) {
      if (mapSubtitle) {
        mapSubtitle.textContent = message;
      }
      showEmptyState(message);
      if (mapContainer) {
        mapContainer.style.display = 'none';
      }
    }

    function formatDate(value) {
      if (!value) {
        return '';
      }

      var date = new Date(value);
      if (isNaN(date.getTime())) {
        return '';
      }

      return date.toLocaleDateString(undefined, {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      }) + ' ' + date.toLocaleTimeString(undefined, {
        timeZone: 'Asia/Shanghai',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    function countryName(code) {
      if (!code) {
        return 'Unknown';
      }

      try {
        if (window.Intl && Intl.DisplayNames) {
          var displayNames = new Intl.DisplayNames(['en'], { type: 'region' });
          return displayNames.of(code) || code;
        }
      } catch (error) {}

      return code;
    }

    function colorForVisitors(value, maxValue) {
      if (!maxValue || value <= 0) {
        return '#eef2f7';
      }

      var ratio = value / maxValue;
      var start = { r: 191, g: 219, b: 254 };
      var end = { r: 29, g: 78, b: 216 };

      function interpolate(channelStart, channelEnd) {
        return Math.round(channelStart + (channelEnd - channelStart) * ratio);
      }

      return 'rgb(' + interpolate(start.r, end.r) + ', ' + interpolate(start.g, end.g) + ', ' + interpolate(start.b, end.b) + ')';
    }

    function numericCount(item) {
      if (!item) {
        return 0;
      }
      return Number(item.pageviews || item.visitors || 0);
    }

    function totalCount(data) {
      if (!data) {
        return 0;
      }
      return Number(data.total_pageviews || data.total_unique_visitors || 0);
    }

    function updatedAtValue(data) {
      if (!data || !data.updated_at) {
        return 0;
      }

      var timestamp = new Date(data.updated_at).getTime();
      return isNaN(timestamp) ? 0 : timestamp;
    }

    function newerData(primary, candidate) {
      return updatedAtValue(candidate) > updatedAtValue(primary) ? candidate : primary;
    }

    function setSvgLabel(target, text) {
      target.setAttribute('data-tooltip', text);
      target.setAttribute('aria-label', text);
    }

    function positionTooltip(event) {
      if (!mapTooltip || !mapWrap) {
        return;
      }

      var wrapRect = mapWrap.getBoundingClientRect();
      var tooltipRect = mapTooltip.getBoundingClientRect();
      var left = event.clientX - wrapRect.left + 12;
      var top = event.clientY - wrapRect.top - tooltipRect.height - 12;

      if (left + tooltipRect.width > wrapRect.width - 8) {
        left = wrapRect.width - tooltipRect.width - 8;
      }
      if (left < 8) {
        left = 8;
      }
      if (top < 8) {
        top = event.clientY - wrapRect.top + 12;
      }
      if (top + tooltipRect.height > wrapRect.height - 8) {
        top = wrapRect.height - tooltipRect.height - 8;
      }

      mapTooltip.style.left = left + 'px';
      mapTooltip.style.top = top + 'px';
    }

    function showTooltip(event, label) {
      if (!mapTooltip) {
        return;
      }

      mapTooltip.textContent = label;
      mapTooltip.style.display = 'block';
      positionTooltip(event);
    }

    function hideTooltip() {
      if (mapTooltip) {
        mapTooltip.style.display = 'none';
      }
    }

    function getHoverModeKey(target) {
      return (target.id || target.getAttribute('id') || target.tagName || 'node').toLowerCase();
    }

    function primaryGeometryTarget(target) {
      if (target.tagName.toLowerCase() === 'g') {
        return target.querySelector('path.mainland') || target;
      }
      return target;
    }

    function hoverModeForTarget(target) {
      var key = getHoverModeKey(target);
      if (hoverModeCache[key]) {
        return hoverModeCache[key];
      }

      var nodes = target.tagName.toLowerCase() === 'g' ? target.querySelectorAll('path') : [target];
      var pathCount = nodes.length;
      var geometryTarget = primaryGeometryTarget(target);
      var box;

      try {
        box = geometryTarget.getBBox();
      } catch (error) {
        box = { width: 0, height: 0 };
      }

      var width = box.width || 0;
      var height = box.height || 0;
      var area = width * height;
      var minEdge = Math.min(width, height);
      var maxEdge = Math.max(width, height) || 1;
      var aspect = maxEdge / Math.max(minEdge, 1);
      var mode = 'lift';

      if (area < 120 || minEdge < 7 || aspect > 5.5) {
        mode = 'soft';
      } else if (area < 1100 || minEdge < 16 || aspect > 3.2 || pathCount > 10) {
        mode = 'gentle';
      }

      hoverModeCache[key] = mode;
      return mode;
    }

    function setHoverState(target, isHovered) {
      var nodes = target.tagName.toLowerCase() === 'g' ? target.querySelectorAll('path') : [target];
      var hoverMode = hoverModeForTarget(target);

      Array.prototype.forEach.call(nodes, function (node) {
        node.classList.toggle('is-hovered', isHovered && hoverMode === 'lift');
        node.classList.toggle('is-hovered-gentle', isHovered && hoverMode === 'gentle');
        node.classList.toggle('is-hovered-soft', isHovered && hoverMode === 'soft');
      });
    }

    function bindTooltip(target, label) {
      var nodes = target.tagName.toLowerCase() === 'g' ? target.querySelectorAll('path') : [target];

      Array.prototype.forEach.call(nodes, function (node) {
        node.onmouseenter = function (event) {
          setHoverState(target, true);
          showTooltip(event, label);
        };
        node.onmousemove = function (event) {
          positionTooltip(event);
        };
        node.onmouseleave = function () {
          setHoverState(target, false);
          hideTooltip();
        };
      });
    }

    function applyFill(target, color, label) {
      var nodes = target.tagName.toLowerCase() === 'g' ? target.querySelectorAll('path') : [target];

      Array.prototype.forEach.call(nodes, function (node) {
        node.style.fill = color;
        node.style.stroke = '#ffffff';
        node.style.strokeWidth = '0.7';
        setSvgLabel(node, label);
      });

      bindTooltip(target, label);
    }

    function getMapTargets(code) {
      var normalized = (code || '').toLowerCase();
      if (normalized === 'cn') {
        return ['cn', 'tw'];
      }
      return [normalized];
    }

    function injectSvgMarkup(markup) {
      mapContainer.innerHTML = markup;
      var svg = mapContainer.querySelector('svg');

      if (svg) {
        svg.classList.add('visitor-map-section__svg');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        svg.removeAttribute('width');
        svg.removeAttribute('height');
      }

      return svg;
    }

    function ensureLocalSvgMap(onSuccess, onError) {
      var existingSvg = mapContainer.querySelector('svg');
      if (existingSvg) {
        onSuccess(existingSvg);
        return;
      }

      try {
        var cachedMarkup = window.localStorage && localStorage.getItem(localSvgCacheKey);
        if (cachedMarkup) {
          onSuccess(injectSvgMarkup(cachedMarkup));
          return;
        }
      } catch (error) {}

      $.get(localSvgMapUrl, function (markup) {
        try {
          if (window.localStorage) {
            localStorage.setItem(localSvgCacheKey, markup);
          }
        } catch (error) {}

        onSuccess(injectSvgMarkup(markup));
      }, 'text').fail(onError);
    }

    function renderMap(data) {
      ensureLocalSvgMap(function (svg) {
        var paths = svg.querySelectorAll('path');
        var maxVisitors = 0;

        Array.prototype.forEach.call(paths, function (path) {
          path.style.fill = '#eef2f7';
          path.style.stroke = '#ffffff';
          path.style.strokeWidth = '0.7';
        });

        (data.countries || []).forEach(function (item) {
          var count = numericCount(item);
          if (count > maxVisitors) {
            maxVisitors = count;
          }
        });

        (data.countries || []).forEach(function (item) {
          var count = numericCount(item);
          var color = colorForVisitors(count, maxVisitors);
          var label = countryName(item.code) + ': ' + count.toLocaleString() + ' pageviews';

          getMapTargets(item.code).forEach(function (targetId) {
            var target = svg.querySelector('#' + targetId);
            if (target) {
              applyFill(target, color, label);
            }
          });
        });
      }, function () {
        setEmptyState('Map asset failed to load.');
      });
    }

    function applyData(data) {
      var countries = data.countries || [];

      if (mapTitle) {
        mapTitle.textContent = staticMapTitle;
      }

      if (mapSubtitle) {
        var updatedAt = formatDate(data.updated_at);
        mapSubtitle.textContent = updatedAt ? 'Updated ' + updatedAt + ' (Beijing Time)' : 'Country-level visitor distribution';
      }

      if (totalVisitors) {
        totalVisitors.textContent = totalCount(data).toLocaleString();
      }

      if (totalCountries) {
        totalCountries.textContent = (data.total_countries || 0).toLocaleString();
      }

      if (countriesList) {
        countriesList.innerHTML = '';

        countries.slice(0, 8).forEach(function (item) {
          var listItem = document.createElement('li');
          var label = document.createElement('span');
          var value = document.createElement('strong');

          label.textContent = countryName(item.code);
          value.textContent = numericCount(item).toLocaleString();

          listItem.appendChild(label);
          listItem.appendChild(value);
          countriesList.appendChild(listItem);
        });
      }

      if (!countries.length) {
        setEmptyState('No pageview data yet.');
        return;
      }

      hideEmptyState();

      if (mapContainer) {
        mapContainer.style.display = 'block';
      }

      renderMap(data);
    }

    function loadStats(url, onSuccess, onError) {
      $.getJSON(url, onSuccess).fail(onError);
    }

    loadStats(cdnStatsUrl, function (data) {
      var countries = data.countries || [];
      var totalVisitorsCount = totalCount(data);

      if (!countries.length && totalVisitorsCount === 0) {
        loadStats(rawStatsUrl + '?t=' + Date.now(), function (freshData) {
          applyData(freshData);
        }, function () {
          applyData(data);
        });
        return;
      }

      applyData(data);
      loadStats(rawStatsUrl + '?t=' + Date.now(), function (freshData) {
        var latestData = newerData(data, freshData);
        if (latestData !== data) {
          applyData(latestData);
        }
      }, function () {});
    }, function () {
      loadStats(rawStatsUrl + '?t=' + Date.now(), function (data) {
        applyData(data);
      }, function () {
      setEmptyState('Waiting for GoatCounter stats. Add the GoatCounter secrets and let the workflow generate the JSON file.');
      });
    });
  });
</script>
