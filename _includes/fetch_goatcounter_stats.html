<script>
  $(document).ready(function () {
    var widget = document.getElementById('goatcounter-visitor-map');
    if (!widget) {
      return;
    }

    var cdnStatsUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@goatcounter-stats/country-stats.json';
    var rawStatsUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/goatcounter-stats/country-stats.json';
    var mapTitle = document.getElementById('goatcounter-map-title');
    var mapSubtitle = document.getElementById('goatcounter-map-subtitle');
    var totalVisitors = document.getElementById('goatcounter-total-visitors');
    var totalCountries = document.getElementById('goatcounter-total-countries');
    var countriesList = document.getElementById('goatcounter-country-list');
    var emptyState = document.getElementById('goatcounter-empty-state');
    var mapContainer = document.getElementById('goatcounter-map');
    var localSvgMapUrl = '{{ "/assets/vendor/world-map.min.svg" | relative_url }}';
    var localSvgCacheKey = 'visitor-map-svg-v1';

    function hideEmptyState() {
      if (emptyState) {
        emptyState.style.display = 'none';
      }
    }

    function showEmptyState(message) {
      if (emptyState) {
        emptyState.textContent = message;
        emptyState.style.display = 'grid';
      }
    }

    function setEmptyState(message) {
      if (mapSubtitle) {
        mapSubtitle.textContent = message;
      }
      showEmptyState(message);
      if (mapContainer) {
        mapContainer.style.display = 'none';
      }
    }

    function formatDate(value) {
      if (!value) {
        return '';
      }

      var date = new Date(value);
      if (isNaN(date.getTime())) {
        return '';
      }

      return date.toLocaleDateString(undefined, {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      }) + ' ' + date.toLocaleTimeString(undefined, {
        timeZone: 'Asia/Shanghai',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }

    function countryName(code) {
      if (!code) {
        return 'Unknown';
      }

      try {
        if (window.Intl && Intl.DisplayNames) {
          var displayNames = new Intl.DisplayNames(['en'], { type: 'region' });
          return displayNames.of(code) || code;
        }
      } catch (error) {}

      return code;
    }

    function colorForVisitors(value, maxValue) {
      if (!maxValue || value <= 0) {
        return '#eef2f7';
      }

      var ratio = value / maxValue;
      var start = { r: 191, g: 219, b: 254 };
      var end = { r: 29, g: 78, b: 216 };

      function interpolate(channelStart, channelEnd) {
        return Math.round(channelStart + (channelEnd - channelStart) * ratio);
      }

      return 'rgb(' + interpolate(start.r, end.r) + ', ' + interpolate(start.g, end.g) + ', ' + interpolate(start.b, end.b) + ')';
    }

    function setSvgTitle(target, text) {
      var svgNamespace = 'http://www.w3.org/2000/svg';
      var title = target.querySelector('title');
      if (!title) {
        title = document.createElementNS(svgNamespace, 'title');
        target.insertBefore(title, target.firstChild);
      }
      title.textContent = text;
    }

    function applyFill(target, color, label) {
      var nodes = target.tagName.toLowerCase() === 'g' ? target.querySelectorAll('path') : [target];

      Array.prototype.forEach.call(nodes, function (node) {
        node.style.fill = color;
        node.style.stroke = '#ffffff';
        node.style.strokeWidth = '0.7';
        setSvgTitle(node, label);
      });
    }

    function getMapTargets(code) {
      var normalized = (code || '').toLowerCase();
      if (normalized === 'cn') {
        return ['cn', 'tw'];
      }
      return [normalized];
    }

    function injectSvgMarkup(markup) {
      mapContainer.innerHTML = markup;
      var svg = mapContainer.querySelector('svg');

      if (svg) {
        svg.classList.add('visitor-map-section__svg');
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      }

      return svg;
    }

    function ensureLocalSvgMap(onSuccess, onError) {
      var existingSvg = mapContainer.querySelector('svg');
      if (existingSvg) {
        onSuccess(existingSvg);
        return;
      }

      try {
        var cachedMarkup = window.localStorage && localStorage.getItem(localSvgCacheKey);
        if (cachedMarkup) {
          onSuccess(injectSvgMarkup(cachedMarkup));
          return;
        }
      } catch (error) {}

      $.get(localSvgMapUrl, function (markup) {
        try {
          if (window.localStorage) {
            localStorage.setItem(localSvgCacheKey, markup);
          }
        } catch (error) {}

        onSuccess(injectSvgMarkup(markup));
      }, 'text').fail(onError);
    }

    function renderMap(data) {
      ensureLocalSvgMap(function (svg) {
        var paths = svg.querySelectorAll('path');
        var maxVisitors = 0;

        Array.prototype.forEach.call(paths, function (path) {
          path.style.fill = '#eef2f7';
          path.style.stroke = '#ffffff';
          path.style.strokeWidth = '0.7';
        });

        (data.countries || []).forEach(function (item) {
          if (item.visitors > maxVisitors) {
            maxVisitors = item.visitors;
          }
        });

        (data.countries || []).forEach(function (item) {
          var color = colorForVisitors(item.visitors, maxVisitors);
          var label = countryName(item.code) + ': ' + item.visitors.toLocaleString();

          getMapTargets(item.code).forEach(function (targetId) {
            var target = svg.querySelector('#' + targetId);
            if (target) {
              applyFill(target, color, label);
            }
          });
        });
      }, function () {
        setEmptyState('Map asset failed to load.');
      });
    }

    function applyData(data) {
      var countries = data.countries || [];

      if (mapTitle) {
        mapTitle.textContent = data.title || 'Visitor Map';
      }

      if (mapSubtitle) {
        var updatedAt = formatDate(data.updated_at);
        mapSubtitle.textContent = updatedAt ? 'Updated ' + updatedAt + ' (Beijing Time)' : 'Country-level visitor distribution';
      }

      if (totalVisitors) {
        totalVisitors.textContent = (data.total_unique_visitors || 0).toLocaleString();
      }

      if (totalCountries) {
        totalCountries.textContent = (data.total_countries || 0).toLocaleString();
      }

      if (countriesList) {
        countriesList.innerHTML = '';

        countries.slice(0, 8).forEach(function (item) {
          var listItem = document.createElement('li');
          var label = document.createElement('span');
          var value = document.createElement('strong');

          label.textContent = countryName(item.code);
          value.textContent = item.visitors.toLocaleString();

          listItem.appendChild(label);
          listItem.appendChild(value);
          countriesList.appendChild(listItem);
        });
      }

      if (!countries.length) {
        setEmptyState('No visitor data yet.');
        return;
      }

      hideEmptyState();

      if (mapContainer) {
        mapContainer.style.display = 'block';
      }

      renderMap(data);
    }

    function loadStats(url, onSuccess, onError) {
      $.getJSON(url, onSuccess).fail(onError);
    }

    loadStats(cdnStatsUrl, function (data) {
      var countries = data.countries || [];
      var totalVisitorsCount = data.total_unique_visitors || 0;

      if (!countries.length && totalVisitorsCount === 0) {
        loadStats(rawStatsUrl + '?t=' + Date.now(), function (freshData) {
          applyData(freshData);
        }, function () {
          applyData(data);
        });
        return;
      }

      applyData(data);
    }, function () {
      loadStats(rawStatsUrl + '?t=' + Date.now(), function (data) {
        applyData(data);
      }, function () {
      setEmptyState('Waiting for GoatCounter stats. Add the GoatCounter secrets and let the workflow generate the JSON file.');
      });
    });
  });
</script>
