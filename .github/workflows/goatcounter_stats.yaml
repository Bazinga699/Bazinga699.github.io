name: Update GoatCounter Visitor Map

on:
  workflow_dispatch:
  schedule:
    - cron: '15 8 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate visitor stats
        run: |
          python3 goatcounter_stats/update_goatcounter_stats.py
        env:
          GOATCOUNTER_SITE_API: ${{ secrets.GOATCOUNTER_SITE_API }}
          GOATCOUNTER_API_KEY: ${{ secrets.GOATCOUNTER_API_KEY }}
          GOATCOUNTER_ROOT_PATHS: "/,/index.html"

      - name: Publish stats branch
        run: |
          cd goatcounter_stats/results
          git init
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          export remote_repo="https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
          git add country-stats.json
          git commit -m "Update GoatCounter visitor stats" || echo "No changes to commit"
          git push "${remote_repo}" HEAD:goatcounter-stats --force
